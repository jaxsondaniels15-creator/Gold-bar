<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Bros</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Inter', sans-serif;
        }
        #container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        .play-button {
            padding: 1.5rem 3rem;
            font-size: 1.5rem;
            font-weight: bold;
            color: #fff;
            background-color: #10b981;
            border: none;
            border-radius: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .play-button:hover {
            transform: scale(1.05);
            background-color: #059669;
        }
    </style>
</head>
<body>
    <div id="container">
        <button class="play-button" onclick="loadGame()">PLAY FOOTBALL BROS</button>
    </div>

    <script>
        function loadGame() {
            const container = document.getElementById('container');
            container.innerHTML = `
                <iframe 
                    src="https://footballbros.io/" 
                    allowfullscreen 
                    allow="autoplay; fullscreen; pointer-lock"
                ></iframe>
            `;
        }
    </script>
</body>
</html>
