<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoldBar.net</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-display { font-family: 'Space Grotesk', sans-serif; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex flex-col" x-data="arcadeApp()" x-init="init()">
    
    <!-- Header -->
    <header class="sticky top-0 z-40 bg-zinc-950/80 backdrop-blur-md border-b border-zinc-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <i data-lucide="gem" class="w-8 h-8 text-amber-500"></i>
                <h1 class="text-xl font-display font-bold tracking-tight">
                    GOLD<span class="text-amber-500">BAR.net</span>
                </h1>
            </div>

            <div class="relative flex-1 max-w-md ml-8">
                <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-500"></i>
                <input
                    type="text"
                    placeholder="Search games..."
                    x-model="searchQuery"
                    class="w-full bg-zinc-900 border border-zinc-800 rounded-full py-2 pl-10 pr-4 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500/50 focus:border-amber-500 transition-all"
                >
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" x-show="filteredGames.length > 0">
            <template x-for="game in filteredGames" :key="game.id">
                <div 
                    @click="openGame(game)"
                    class="group relative bg-zinc-900 rounded-2xl overflow-hidden border border-zinc-800 hover:border-amber-500/50 transition-all cursor-pointer hover:-translate-y-1"
                >
                    <div class="aspect-video overflow-hidden">
                        <img
                            :src="game.thumbnail"
                            :alt="game.title"
                            class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"
                            referrerpolicy="no-referrer"
                        >
                    </div>
                    <div class="p-4">
                        <h3 class="font-bold text-lg mb-1 group-hover:text-amber-400 transition-colors" x-text="game.title"></h3>
                        <p class="text-sm text-zinc-400 line-clamp-2" x-text="game.description"></p>
                    </div>
                    <div class="absolute inset-0 bg-amber-500/10 opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none"></div>
                </div>
            </template>
        </div>

        <!-- Empty State -->
        <div class="flex flex-col items-center justify-center py-20 text-zinc-500" x-show="filteredGames.length === 0" x-cloak>
            <i data-lucide="search" class="w-12 h-12 mb-4 opacity-20"></i>
            <p class="text-lg">No games found matching "<span x-text="searchQuery"></span>"</p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-zinc-800 py-8 mt-auto">
        <div class="max-w-7xl mx-auto px-4 text-center text-zinc-500 text-sm">
            <p>&copy; 2024 GoldBar.net. All games are property of their respective owners.</p>
        </div>
    </footer>

    <!-- Game Modal -->
    <div 
        class="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-6" 
        x-show="selectedGame" 
        x-transition:enter="transition ease-out duration-300"
        x-transition:enter-start="opacity-0"
        x-transition:enter-end="opacity-100"
        x-transition:leave="transition ease-in duration-200"
        x-transition:leave-start="opacity-100"
        x-transition:leave-end="opacity-0"
        x-cloak
    >
        <div class="absolute inset-0 bg-zinc-950/90 backdrop-blur-sm" @click="closeGame()"></div>
        
        <div 
            class="relative w-full max-w-5xl bg-zinc-900 rounded-3xl overflow-hidden border border-zinc-800 shadow-2xl flex flex-col h-[85vh]"
            x-show="selectedGame"
            x-transition:enter="transition ease-out duration-300"
            x-transition:enter-start="opacity-0 scale-95 translate-y-4"
            x-transition:enter-end="opacity-100 scale-100 translate-y-0"
        >
            <!-- Modal Header -->
            <div class="flex items-center justify-between px-6 py-4 border-b border-zinc-800">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl overflow-hidden">
                        <img :src="selectedGame?.thumbnail" alt="" class="w-full h-full object-cover" referrerpolicy="no-referrer">
                    </div>
                    <div>
                        <h2 class="font-bold text-xl leading-none" x-text="selectedGame?.title"></h2>
                        <p class="text-xs text-zinc-500 mt-1">Playing in Arcade Mode</p>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <button
                        @click="window.open(selectedGame.url, '_blank')"
                        class="p-2 hover:bg-zinc-800 rounded-lg text-zinc-400 hover:text-white transition-colors"
                        title="Open in new tab"
                    >
                        <i data-lucide="external-link" class="w-5 h-5"></i>
                    </button>
                    <button
                        @click="closeGame()"
                        class="p-2 hover:bg-zinc-800 rounded-lg text-zinc-400 hover:text-white transition-colors"
                    >
                        <i data-lucide="x" class="w-6 h-6"></i>
                    </button>
                </div>
            </div>

            <!-- Game Iframe -->
            <div class="flex-1 bg-black relative">
                <template x-if="selectedGame">
                    <iframe
                        :src="selectedGame.url"
                        class="w-full h-full border-none"
                        allow="accelerometer *; ambient-light-sensor *; autoplay *; camera *; clipboard-read *; clipboard-write *; encrypted-media *; fullscreen *; geolocation *; gyroscope *; local-network-access *; magnetometer *; microphone *; midi *; payment *; picture-in-picture *; screen-wake-lock *; speaker *; sync-xhr *; usb *; vibrate *; vr *; web-share *; pointer-lock *"
                        :title="selectedGame.title"
                        tabindex="0"
                        sandbox="allow-downloads allow-forms allow-modals allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts allow-top-navigation-by-user-activation allow-storage-access-by-user-activation allow-pointer-lock allow-orientation-lock allow-presentation"
                    ></iframe>
                </template>
            </div>

            <!-- Modal Footer -->
            <div class="px-6 py-4 bg-zinc-900/50 border-t border-zinc-800 flex items-center justify-between">
                <p class="text-sm text-zinc-400 max-w-2xl truncate" x-text="selectedGame?.description"></p>
                <div class="flex items-center gap-4">
                    <span class="text-xs font-mono text-zinc-600 uppercase tracking-widest">
                        Arcade Engine v1.0
                    </span>
                </div>
            </div>
        </div>
    </div>

    <script>
        function arcadeApp() {
            return {
                games: [],
                searchQuery: '',
                selectedGame: null,
                
                async init() {
                    try {
                        const response = await fetch('games.json');
                        this.games = await response.json();
                        this.$nextTick(() => lucide.createIcons());
                    } catch (error) {
                        console.error('Error loading games:', error);
                    }
                },

                get filteredGames() {
                    if (!this.searchQuery) return this.games;
                    const query = this.searchQuery.toLowerCase();
                    return this.games.filter(game => 
                        game.title.toLowerCase().includes(query) || 
                        game.description.toLowerCase().includes(query)
                    );
                },

                openGame(game) {
                    this.selectedGame = game;
                    document.body.style.overflow = 'hidden';
                    this.$nextTick(() => {
                        lucide.createIcons();
                        const iframe = document.querySelector('iframe');
                        if (iframe) iframe.focus();
                    });
                },

                closeGame() {
                    this.selectedGame = null;
                    document.body.style.overflow = 'auto';
                }
            }
        }
    </script>
</body>
</html>
