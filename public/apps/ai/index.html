<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoldBar AI - Neural Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
    {
      "imports": {
        "@google/genai": "https://esm.run/@google/genai"
      }
    }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
        
        body { 
            background: #050505; 
            color: #ffffff; 
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        
        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .ai-glow {
            box-shadow: 0 0 30px rgba(251, 191, 36, 0.1);
        }

        .chat-container::-webkit-scrollbar { width: 4px; }
        .chat-container::-webkit-scrollbar-thumb { background: rgba(251, 191, 36, 0.3); border-radius: 10px; }
        
        .code-block {
            font-family: 'JetBrains Mono', monospace;
            background: #000;
            padding: 1rem;
            border-radius: 0.75rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin: 0.5rem 0;
            font-size: 0.75rem;
            overflow-x: auto;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1.05); opacity: 0.2; }
            100% { transform: scale(0.95); opacity: 0.5; }
        }

        .pulse { animation: pulse-ring 2s infinite ease-in-out; }
    </style>
</head>
<body class="h-screen flex flex-col p-4 md:p-8">
    <div class="max-w-4xl w-full mx-auto flex flex-col h-full space-y-6">
        <!-- Header -->
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="relative">
                    <div class="w-12 h-12 bg-amber-500 rounded-2xl flex items-center justify-center ai-glow relative z-10">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>
                    </div>
                    <div class="absolute inset-0 bg-amber-500 rounded-2xl pulse opacity-50 z-0 scale-125"></div>
                </div>
                <div>
                    <h1 class="text-2xl font-black italic tracking-tighter">GOLD<span class="text-amber-400">BAR</span>_AI</h1>
                    <p class="text-[10px] font-mono text-white/40 uppercase tracking-widest">Neural_Assistant // Core_v3.0_Redux</p>
                </div>
            </div>
            <button onclick="clearHistory()" class="px-3 py-1 bg-white/5 border border-white/10 rounded text-[9px] font-mono uppercase tracking-widest hover:bg-white/10 transition-all opacity-50 hover:opacity-100">WIPE_MEMORY</button>
        </div>

        <!-- Chat History -->
        <div id="chatHistory" class="flex-1 overflow-y-auto space-y-6 chat-container pr-4">
            <!-- System Welcome -->
            <div class="flex gap-4">
                <div class="w-8 h-8 rounded-lg bg-amber-500/10 flex items-center justify-center border border-amber-500/20 shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M12 8V4H8"/></svg>
                </div>
                <div class="space-y-2">
                    <span class="text-[9px] font-bold text-amber-500 uppercase tracking-widest">System_Init</span>
                    <p class="text-sm text-white/70 leading-relaxed">Uplink established. I am GOLDBAR_AI. I have been redone for peak performance. How can I assist your arcade experience today?</p>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="glass rounded-2xl p-2 focus-within:border-amber-500/30 transition-all">
            <form id="chatForm" class="flex gap-2">
                <input 
                    type="text" 
                    id="userInput" 
                    placeholder="ENTER_COMMAND_HERE..." 
                    class="flex-1 bg-transparent border-none focus:outline-none px-4 py-3 text-sm font-mono placeholder:text-white/10"
                    autocomplete="off"
                >
                <button type="submit" class="bg-amber-500 text-black px-6 py-2 rounded-xl font-black text-xs uppercase tracking-widest hover:bg-amber-400 transition-all flex items-center gap-2">
                    Execute
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="22" x2="11" y1="2" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>
            </form>
        </div>
    </div>

    <script type="module">
        import { GoogleGenAI } from "@google/genai";

        const chatHistoryElement = document.getElementById('chatHistory');
        const chatForm = document.getElementById('chatForm');
        const userInput = document.getElementById('userInput');

        // Note: The GEMINI_API_KEY will be provided to this iframe dynamically 
        // by the parent if needed, or if it's in the environment it might just work.
        // For reliability, we expect the parent to post it or we try to get it from process.env if available in this build step.
        const API_KEY = ""; // Will be injected or retrieved

        let ai;
        let chat;

        async function initAI(key) {
            try {
                ai = new GoogleGenAI({ apiKey: key });
                chat = ai.chats.create({
                    model: "gemini-3-flash-preview",
                    config: {
                        systemInstruction: "You are GOLDBAR_AI, the neural assistant for the GoldBar Arcade. You are helpful, futuristic, and tech-savvy. You help users find games, give gaming tips, and answer general questions about the arcade. Use a tech-oriented, slightly robotic but friendly persona. Use formatting like code blocks for technical info."
                    }
                });
            } catch (err) {
                console.error("AI Initialization failed:", err);
            }
        }

        // Listen for API key from parent
        window.addEventListener('message', (event) => {
            if (event.data.type === 'GOLDBAR_INIT') {
                initAI(event.data.apiKey);
            }
        });

        // Try to get key from parent directly if possible
        if (window.parent && window.parent.GOLDBAR_KEY) {
            initAI(window.parent.GOLDBAR_KEY);
        } else {
            // Fallback for standalone preview if env is available
            // Note: In typical Build environment, process.env is handled.
            const envKey = "[[GEMINI_API_KEY]]"; // Placeholder
            if (envKey && !envKey.startsWith("[[")) {
                initAI(envKey);
            }
        }

        function appendMessage(role, text) {
            const container = document.createElement('div');
            container.className = 'flex gap-4 ' + (role === 'user' ? 'flex-row-reverse' : '');
            
            const icon = document.createElement('div');
            icon.className = `w-8 h-8 rounded-lg flex items-center justify-center shrink-0 border ${role === 'user' ? 'bg-white/5 border-white/10' : 'bg-amber-500/10 border-amber-500/20'}`;
            icon.innerHTML = role === 'user' 
                ? '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="opacity-40"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>'
                : '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M12 8V4H8"/></svg>';

            const content = document.createElement('div');
            content.className = `space-y-1 ${role === 'user' ? 'text-right' : ''}`;
            
            const label = document.createElement('span');
            label.className = `text-[9px] font-bold uppercase tracking-widest ${role === 'user' ? 'text-white/20' : 'text-amber-500'}`;
            label.innerText = role === 'user' ? 'You' : 'GoldBar_AI';

            const p = document.createElement('p');
            p.className = `text-sm leading-relaxed ${role === 'user' ? 'text-white/60' : 'text-white/80'}`;
            
            // Basic markdown handling
            let formattedText = text.replace(/```([\s\S]*?)```/g, '<div class="code-block">$1</div>');
            formattedText = formattedText.replace(/`([^`]+)`/g, '<code class="bg-white/10 px-1 rounded">$1</code>');
            p.innerHTML = formattedText;

            content.appendChild(label);
            content.appendChild(p);
            
            container.appendChild(icon);
            container.appendChild(content);
            
            chatHistoryElement.appendChild(container);
            chatHistoryElement.scrollTop = chatHistoryElement.scrollHeight;
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text) return;

            if (!chat) {
                appendMessage('system', 'ERROR: Neural uplink not yet initialized. Please wait for the GOLDBAR_NET connection.');
                return;
            }

            appendMessage('user', text);
            userInput.value = '';

            try {
                const stream = await chat.sendMessageStream({ message: text });
                
                // Create placeholders for response
                const container = document.createElement('div');
                container.className = 'flex gap-4';
                const icon = document.createElement('div');
                icon.className = 'w-8 h-8 rounded-lg flex items-center justify-center shrink-0 border bg-amber-500/10 border-amber-500/20';
                icon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M12 8V4H8"/></svg>';
                const content = document.createElement('div');
                content.className = 'space-y-1';
                const label = document.createElement('span');
                label.className = 'text-[9px] font-bold uppercase tracking-widest text-amber-500';
                label.innerText = 'GoldBar_AI';
                const p = document.createElement('p');
                p.className = 'text-sm leading-relaxed text-white/80';
                
                content.appendChild(label);
                content.appendChild(p);
                container.appendChild(icon);
                container.appendChild(content);
                chatHistoryElement.appendChild(container);

                let fullText = "";
                for await (const chunk of stream) {
                    fullText += chunk.text;
                    let formatted = fullText.replace(/```([\s\S]*?)```/g, '<div class="code-block">$1</div>');
                    formatted = formatted.replace(/`([^`]+)`/g, '<code class="bg-white/10 px-1 rounded">$1</code>');
                    p.innerHTML = formatted;
                    chatHistoryElement.scrollTop = chatHistoryElement.scrollHeight;
                }
            } catch (err) {
                appendMessage('system', 'Neural error: ' + err.message);
            }
        });

        window.clearHistory = () => {
            if (confirm('Wipe neural history?')) {
                chatHistoryElement.innerHTML = '';
                appendMessage('system', 'Neural memory wipe complete. Uplink re-initialized.');
            }
        }
    </script>
</body>
</html>
