<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Requests - GoldBar Records</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #ffffff; font-family: monospace; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .chat-scroll::-webkit-scrollbar { width: 4px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: rgba(251, 191, 36, 0.3); border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex flex-col p-4 md:p-8">
    <div class="max-w-3xl w-full mx-auto flex flex-col h-full space-y-6">
        <!-- Header -->
        <div class="flex items-center justify-between border-b border-white/10 pb-6">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-amber-500/10 rounded-2xl flex items-center justify-center border border-amber-500/20 shadow-[0_0_20px_rgba(251,191,36,0.05)]">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                </div>
                <div>
                    <h1 class="text-2xl font-black italic tracking-tighter uppercase">TRANSMISSION<span class="text-amber-400">_BUFFER</span></h1>
                    <p class="text-[10px] font-mono text-white/40 uppercase tracking-widest">Global_Game_Submission_Portal // Review_Queue_Active</p>
                </div>
            </div>
            <div id="statusIndicator" class="flex flex-col items-end">
                <div class="flex items-center gap-2">
                    <span class="w-1.5 h-1.5 bg-amber-400 rounded-full animate-pulse"></span>
                    <span class="text-[10px] text-amber-400 uppercase font-bold tracking-widest">Awaiting_Data</span>
                </div>
                <span class="text-[7px] text-white/20 font-mono mt-1 uppercase">Channel_ID: REQUEST_v3</span>
            </div>
        </div>

        <!-- Submission Form -->
        <div class="glass rounded-3xl p-8 space-y-6">
            <div class="space-y-2">
                <label class="text-[10px] font-bold text-white/30 uppercase tracking-[0.2em]">GameTitle_URL_Description</label>
                <textarea 
                    id="requestInput" 
                    placeholder="ENTER_GAME_DETAILS_HERE... (E.G. Tetris - http://tetris.link - A classic block puzzle game)" 
                    class="w-full h-32 bg-black/40 border border-white/10 rounded-2xl p-6 text-sm font-mono text-white/80 focus:outline-none focus:border-amber-500/50 transition-all resize-none placeholder:text-white/5"
                ></textarea>
            </div>
            
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-4 text-white/20">
                    <div class="flex flex-col">
                        <span class="text-[8px] uppercase tracking-widest font-bold">Priority</span>
                        <span class="text-[10px] text-amber-500/50 uppercase font-mono">Standard_Queue</span>
                    </div>
                </div>
                <button 
                    onclick="submitRequest()" 
                    id="submitBtn"
                    class="bg-amber-500 text-black px-10 py-4 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-amber-400 hover:scale-105 active:scale-95 transition-all flex items-center gap-3 shadow-[0_10px_30px_rgba(251,191,36,0.2)]"
                >
                    Submit_Request
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></svg>
                </button>
            </div>
        </div>

        <!-- Recent Activity Feed -->
        <div class="flex-1 overflow-hidden flex flex-col space-y-4">
            <div class="flex items-center gap-2 px-2">
                <span class="text-[8px] font-bold text-white/30 uppercase tracking-widest">Recent_Incoming_Transmissions</span>
                <div class="h-[1px] flex-1 bg-white/5"></div>
            </div>
            <div id="recentFeed" class="flex-1 overflow-y-auto chat-scroll space-y-2 pr-2">
                <!-- Feed items injected here -->
            </div>
        </div>
    </div>

    <script type="module">
        const requestInput = document.getElementById('requestInput');
        const recentFeed = document.getElementById('recentFeed');
        const submitBtn = document.getElementById('submitBtn');

        let parentDb = null;
        let currentUser = null;

        function init() {
            if (window.parent && window.parent.GoldBarFirestore && window.parent.GoldBarAuth) {
                parentDb = window.parent.GoldBarFirestore.db;
                
                window.parent.GoldBarAuth.onAuthStateChanged(window.parent.GoldBarAuth.auth, (user) => {
                    currentUser = user;
                });

                // Listen for requests
                const q = window.parent.GoldBarFirestore.query(
                    window.parent.GoldBarFirestore.collection(parentDb, 'messages'),
                    window.parent.GoldBarFirestore.where('type', '==', 'request'),
                    window.parent.GoldBarFirestore.orderBy('timestamp', 'desc'),
                    window.parent.GoldBarFirestore.limit(10)
                );

                window.parent.GoldBarFirestore.onSnapshot(q, (snapshot) => {
                    const reqs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    renderFeed(reqs);
                });
            }
        }

        function renderFeed(reqs) {
            recentFeed.innerHTML = reqs.map(req => `
                <div class="flex items-center justify-between p-3 bg-white/5 rounded-xl border border-white/5">
                    <div class="flex flex-col gap-1">
                        <span class="text-[8px] font-bold text-amber-500 uppercase tracking-widest">${req.userName || 'Anonymous_Unit'}</span>
                        <p class="text-[10px] text-white/50 truncate max-w-md">${req.text}</p>
                    </div>
                    <span class="text-[8px] text-white/20 font-mono">${formatDate(req.timestamp)}</span>
                </div>
            `).join('');
        }

        function formatDate(ts) {
            if (!ts) return '';
            const date = ts.toDate ? ts.toDate() : new Date(ts);
            return date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        window.submitRequest = async () => {
            const text = requestInput.value.trim();
            if (!text || !parentDb) return;

            submitBtn.disabled = true;
            submitBtn.innerText = 'Transmitting...';

            try {
                await window.parent.GoldBarFirestore.addDoc(window.parent.GoldBarFirestore.collection(parentDb, 'messages'), {
                    userId: currentUser ? currentUser.uid : 'guest',
                    userName: currentUser ? (currentUser.displayName || currentUser.email) : 'Guest User',
                    text: text,
                    type: 'request',
                    status: 'pending',
                    timestamp: window.parent.GoldBarFirestore.serverTimestamp()
                });
                requestInput.value = '';
                alert('Transmission Successful. Request added to queue.');
            } catch (err) {
                console.error("Submission error:", err);
                alert('Transmission Failed: ' + err.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = 'Submit_Request';
            }
        };

        init();
    </script>
</body>
</html>
