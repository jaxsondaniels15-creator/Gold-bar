<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>      html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;font-family:"Gill Sans",sans-serif;background:transparent}
        .game-embed-container{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background-color:#064e3b;border-radius:10px;overflow:hidden;position:relative;box-sizing:border-box;color:#fff;text-align:center}
        .button-wrapper{display:flex;flex-direction:column;align-items:center;gap:25px;padding:20px;width:100%;max-width:550px;box-sizing:border-box}
        .logo-text{font-family:"Gill Sans",sans-serif;font-size:2.5rem;font-weight:bold;color:#fff;text-shadow:2px 2px 5px rgba(0,0,0,.6);padding-bottom:10px}
        .button-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;width:100%}
        @media (max-width:480px){.button-grid{grid-template-columns:1fr}.logo-text{font-size:2rem}}
        .c-button{min-height:50px;appearance:none;border:2px solid rgba(255,255,255,0.1);border-radius:8px;color:#fff;padding:10px 15px;font-size:18px;cursor:pointer;transition:all .2s ease-in-out;text-align:center;display:flex;align-items:center;justify-content:center;font-weight:bold}
        .btn-primary{background:#10b981}
        .btn-primary:hover{background:#34d399;color:#064e3b;border-color:#6ee7b7;transform:translateY(-2px)}
        .btn-alt{background:#065f46}
        .btn-alt:hover{background:#047857;color:#ecfdf5;border-color:#10b981;transform:translateY(-2px)}
        .c-button:focus{outline:none;box-shadow:0 0 0 4px #6ee7b7}
        .game-embed-container iframe{width:100%;height:100%;border:none}
    </style>
</head>
<body>
    <div id="gameContainer" class="game-embed-container">
        <div id="buttonWrapper" class="button-wrapper">
            <div class="logo-text">FOOTBALL BROS</div>
            <div class="button-grid">
                <button id="playInline" class="c-button btn-primary">PLAY HERE</button>
                <button id="playFullscreen" class="c-button btn-primary">FULLSCREEN (No Lag)</button>
            </div>
            <p style="font-size: 0.9rem; opacity: 0.8; margin-top: 10px;">Tip: Use Fullscreen for the smoothest performance!</p>
        </div>
    </div>
    <script>
        const gameContainer = document.getElementById("gameContainer");
        const gameUrl = "https://footballbros.io/";
        const playInlineBtn = document.getElementById("playInline");
        const playFullscreenBtn = document.getElementById("playFullscreen");

        playInlineBtn.addEventListener("click", () => {
            gameContainer.innerHTML = "";
            const iframe = document.createElement("iframe");
            iframe.src = gameUrl;
            iframe.allow = "fullscreen; autoplay; encrypted-media; pointer-lock";
            iframe.style.width = "100%";
            iframe.style.height = "100%";
            gameContainer.appendChild(iframe);
        });

        playFullscreenBtn.addEventListener("click", () => {
            window.open(gameUrl, "_blank");
        });
    </script>
</body>
</html>
